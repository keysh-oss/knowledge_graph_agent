<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>
</head>
<body>
  <h2>Login</h2>
  {% if error %}
  <p style="color:red">{{ error }}</p>
  {% endif %}
  <form method="post">
    <label>API Key: <input type="password" name="api_key" /></label>
    <button type="submit">Login</button>
  </form>
</body>
</html>
